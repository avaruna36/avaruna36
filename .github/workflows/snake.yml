name: refresh snake panel

on:
  schedule:
    - cron: "23 3 * * *"          # daily, just after radar
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/gen_snake.py"
      - "scripts/fonts.py"
      - "scripts/palette.py"
      - "fonts/**"
      - ".github/workflows/snake.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: pip install fonttools
      - name: generate panel6_snake.svg (contribution-calendar snake)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RADAR_USER: ${{ github.repository_owner }}
        run: python scripts/gen_snake.py --out panel6_snake.svg
      - name: commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panel6_snake.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh snake panel"
            git pull --rebase origin main
            git push origin main
          else
            echo "no changes — skipping commit, pull and push"
          fi
