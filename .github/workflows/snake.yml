name: Generate Snake

# Generates the contribution snake and commits it to assets/github-snake.svg on the
# default branch, so the README can reference it with a reliable relative path.
# Run once from the Actions tab (Run workflow); it then refreshes every 12h.

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg?color_snake=%23bd5c89&color_dots=%239e9e9e,%2340c463,%2330a14e,%23216e39,%23166b34

      - name: Commit snake to the repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution snake"
          file_pattern: assets/github-snake.svg
