name: refresh radar panel

on:
  schedule:
    - cron: "17 3 * * *"        # daily 03:17 UTC
  workflow_dispatch: {}          # manual run button
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "fonts/**"
      - ".github/workflows/radar.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install fonttools

      - name: generate panel4_radar.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RADAR_USER: ${{ github.repository_owner }}
        run: python scripts/gen_radar.py --out panel4_radar.svg

      - name: commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panel4_radar.svg
          git diff --cached --quiet || git commit -m "chore: refresh radar panel"
          git push
